name: Build

on:
  workflow_dispatch:
    inputs:
      source:
        required: false
        default: ""
      mode:
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y file gh python3 python3-pip
          pip3 install packaging

      - name: Prepare keystore
        run: |
          [ "${{ github.repository }}" = "rjaakash/peachmeow" ] && echo "${{ secrets.SIGNING_KEYSTORE_B64 }}" | base64 -d > morphe-release.bks || true

      - name: Authenticate gh
        run: echo "${{ secrets.PEACHMEOW_GITHUB_PAT }}" | gh auth login --with-token

      - name: Run builder
        env:
          SIGNING_KEYSTORE_PASSWORD: ${{ github.repository == 'rjaakash/peachmeow' && secrets.SIGNING_KEYSTORE_PASSWORD || 'android' }}
          SIGNING_KEY_ALIAS: ${{ github.repository == 'rjaakash/peachmeow' && secrets.SIGNING_KEY_ALIAS || 'android' }}
          SIGNING_KEY_PASSWORD: ${{ github.repository == 'rjaakash/peachmeow' && secrets.SIGNING_KEY_PASSWORD || 'android' }}
          PEACHMEOW_GITHUB_PAT: ${{ secrets.PEACHMEOW_GITHUB_PAT }}
        run: |
          if [ -z "${{ github.event.inputs.source }}" ]; then
            python3 main.py
          else
            if [ -z "${{ github.event.inputs.mode }}" ]; then
              python3 main.py --source "${{ github.event.inputs.source }}"
            else
              python3 main.py --source "${{ github.event.inputs.source }}" --mode "${{ github.event.inputs.mode }}"
            fi
          fi
